# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: [ "3.7", "3.8", "3.9", "3.10", "3.11" ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.python-version }}" = "3.7" ]; then
            # Pipfile.lock targets Python 3.8+ (black==24.8.0, pandas 1.5+, etc.)
            # and many transitive deps gate themselves with python_version >= '3.8',
            # so pipenv sync silently skips them on 3.7 and tests crash. Fall back
            # to plain pip with version caps that mirror Pipfile [packages] plus
            # the Pipfile-only runtime deps that aren't yet in requirements.txt.
            pip install -e . \
              "pydantic<2.0.0" "pandas<2.0.0" "numpy<2.0.0" \
              "lxml<5.0.0" "pyecharts<2.0.0" "ipython<8.0.0" \
              "loguru<1.0.0" "aiohttp<4.0.0" "importlib-metadata<5.0.0" \
              "Flask<3.0.0" "typing-extensions>=4.0.0,<5.0.0" "ta<1.0.0" \
              "requests<3.0.0" \
              "tqdm" "pyarrow" "exceptiongroup" "tomli" "async-timeout" \
              "nest-asyncio==1.6.0"
            pip install pytest==6.2.5 pytest-mock==3.6.1 pytest-cov==3.0.0
          else
            pip install pipenv
            pipenv --python $(which python)
          fi
      - name: Install package
        run: |
          if [ "${{ matrix.python-version }}" = "3.7" ]; then
            echo "skipped (handled in plain pip step above)"
          else
            pipenv sync
            pipenv sync -d
          fi
      - name: Test with pytest
        env:
          FINMIND_USER: ${{ secrets.FINMIND_USER }}
          FINMIND_PASSWORD: ${{ secrets.FINMIND_PASSWORD }}
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python genenv.py
          if [ "${{ matrix.python-version }}" = "3.7" ]; then
            python -m pytest --cov-report term-missing --cov-config=.coveragerc --cov=./ tests/
          else
            pipenv run pytest --cov-report term-missing --cov-config=.coveragerc --cov=./ tests/
          fi
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install Black
        run: |
          python -m pip install --upgrade pip
          pip install black==24.8.0
      - name: Check code formatting with Black
        run: |
          black -l 80 --check FinMind tests
